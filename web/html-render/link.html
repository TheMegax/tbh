<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920px, initial-scale=1.0">
    <title>Template Link</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 1080px;
            width: 1920px;
            background: linear-gradient(#71C4FFFF, #A100FFFF);
        }

        .card {
            width: 1200px;
            max-height: 960px;
            display: flex;
            flex-direction: column;
            border-radius: 60px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            background-color: white;
            box-sizing: border-box;
        }

        .content {
            padding: 90px 60px;
            text-align: center;
            color: #000;
            font-size: 60px;
            font-weight: bold;
            overflow-wrap: break-word;
            flex-grow: 1;
            flex-shrink: 1;
            overflow: hidden;
            box-sizing: border-box;
        }

        img.emoji {
            height: 1em;
            width: 1em;
            margin: 0 .05em 0 .1em;
            vertical-align: -0.1em;
        }
    </style>
    <script src="https://unpkg.com/twemoji@latest/dist/twemoji.min.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="card">
        <div class="content">
            $ask_title
        </div>
    </div>
    <script>
        twemoji.parse(document.body);
    </script>
</body>

</html>
